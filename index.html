<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Julius+Sans+One&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="page">

    <header>
      <h1 id="fullName"></h1>
      <p class="subtitle" id="ametinimetus"></p>
      <div class="contact">
        <span id="telefon"></span>
        <span id="email"></span>
      </div>
    </header>

    <section>
      <h2>SUMMARY</h2>
      <p id="kokkuvote"></p>
    </section>

    <section>
      <h2>EXPERIENCE</h2>
      <div id="tookogemus"></div>
    </section>

    <section>
      <h2>EDUCATION</h2>
      <div id="haridus"></div>
    </section>

    <section>
      <h2>GALLERY</h2>
      <div class="carousel">
        <img class="carousel-img" src="images/photo1.jpg" alt="Gallery photo" onclick="nextImage()"/>
        <p class="carousel-hint">CLICK IMAGE TO BROWSE</p>
        <div class="carousel-dots" id="carouselDots"></div>
      </div>
    </section>

    <section>
      <h2>SKILLS</h2>
      <ul id="oskused"></ul>
    </section>

    <section>
      <h2>LANGUAGES</h2>
      <ul id="keeled"></ul>
    </section>

  </div>

  <script>
    // ── Load CV data from JSON ──────────────────────────────
    fetch('cv.json')
      .then(res => res.json())
      .then(cv => {
        // Header
        document.getElementById('fullName').textContent = cv.nimi + ' ' + cv.perekonnanimi;
        document.getElementById('ametinimetus').textContent = cv.ametinimetus;
        document.getElementById('telefon').textContent = cv.telefon;
        document.getElementById('email').textContent = cv.email;

        // Summary
        document.getElementById('kokkuvote').textContent = cv.kokkuvote;

        // Work experience
        const tooEl = document.getElementById('tookogemus');
        cv.tookogemus.forEach(too => {
          tooEl.innerHTML += `
            <div class="entry">
              <div class="entry-top">
                <div>
                  <p class="entry-title">${too.ametikoht}</p>
                  <p class="entry-company">${too.ettevote}</p>
                </div>
                <p class="entry-date">${too.periood}</p>
              </div>
              <p class="entry-desc">${too.kirjeldus}</p>
              <ul>${too.oskused.map(o => `<li>${o}</li>`).join('')}</ul>
            </div>`;
        });

        // Education
        const harEl = document.getElementById('haridus');
        cv.haridus.forEach(h => {
          harEl.innerHTML += `
            <p>${h.kraad}<br/>${h.kool}${h.lisainfo ? '<br/>' + h.lisainfo : ''}</p><br/>`;
        });

        // Skills
        const oskEl = document.getElementById('oskused');
        cv.oskused.forEach(o => {
          oskEl.innerHTML += `<li>${o}</li>`;
        });

        // Languages
        const keelEl = document.getElementById('keeled');
        cv.keeled.forEach(k => {
          keelEl.innerHTML += `<li>${k.keel} – ${k.tase}</li>`;
        });
      });

    // ── Carousel ───────────────────────────────────────────
    const images = [
      'images/photo1.jpg',
      'images/photo2.jpg',
      'images/photo3.jpg'
    ];

    let current = 0;
    const imgEl = document.querySelector('.carousel-img');
    const dotsEl = document.getElementById('carouselDots');

    images.forEach((_, i) => {
      const dot = document.createElement('span');
      dot.classList.add('dot');
      if (i === 0) dot.classList.add('active');
      dot.onclick = () => goToImage(i);
      dotsEl.appendChild(dot);
    });

    function updateDots() {
      document.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === current);
      });
    }

    function goToImage(index) {
      current = index;
      imgEl.classList.add('fade');
      setTimeout(() => {
        imgEl.src = images[current];
        imgEl.classList.remove('fade');
      }, 200);
      updateDots();
    }

    function nextImage() {
      current = (current + 1) % images.length;
      goToImage(current);
    }
  </script>

</body>
</html>
